<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Defense-in-depth mirror of the authoritative header CSP installed by the
      main process (src/main/security.ts), matching the unlock window's. The
      settings window makes NO network calls (everything goes to main over
      IPC), so connect-src stays 'self'. No 'unsafe-eval'; style-src allows
      'unsafe-inline' only for the bundled stylesheet's needs, never inline
      script.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>MyQRLWallet Settings</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
